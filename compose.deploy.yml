services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskboard
      POSTGRES_PASSWORD: taskboard123
      POSTGRES_DB: taskboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskboard-net

  ssh-server:
    build:
      context: .
      dockerfile: Dockerfile.ssh
    ports:
      - "2222:22"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      SSH_PUBLIC_KEY: ${SSH_PUBLIC_KEY}
    networks:
      - taskboard-net

networks:
  taskboard-net:
    name: taskboard-net

volumes:
  postgres_data:
